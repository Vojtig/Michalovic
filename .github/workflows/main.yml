on: 
  workflow_dispatch:  # This enables manual triggering
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'production'
        type: choice
        options:
          - master
          - Dev
      debug_enabled:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean
  push:
    branches: [master]
  pull_request:
    types: [closed]
    branches: [master]
    
name: 🚀 Deploy website on PR merge

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: 185.102.21.251
        port: 21
        username: michalovic.endora.site
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        server-dir: public_html/
        exclude: |
          **/.git*
          **/.github/**
          **/node_modules/**
          **/tests/**
          **/coverage/**
          **/.babelrc
          **/package*.json
          **/.mcp.json
          **/CLAUDE.md
          **/STRUCTURE.md
          **/.gitignore
          **/shopping-list-app/**
          **/*.jsx
          **/docs/**
